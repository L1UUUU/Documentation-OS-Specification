# This workflow verifies the Go engine and CLI across supported desktop platforms.
name: Go conformance

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      engine_version:
        description: Published Engine module version to smoke test (for example v0.1.0-rc.4)
        required: false
        type: string
  workflow_call:
    inputs:
      engine_version:
        description: Published Engine module version to smoke test
        required: true
        type: string

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false
      - name: CLI and release tooling tests
        run: go test -count=1 ./...
      - name: Engine public API and conformance tests
        run: go -C engine test -count=1 ./...
      - name: Vet CLI and release tooling
        run: go vet ./...
      - name: Vet Engine
        run: go -C engine vet ./...
      - name: Build CLI
        run: go build ./cmd/dos
      - name: Select published Engine version
        id: engine-version
        shell: pwsh
        env:
          REQUESTED_VERSION: ${{ inputs.engine_version }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          if ($env:REQUESTED_VERSION) {
            $version = $env:REQUESTED_VERSION
          } elseif ($env:REF_TYPE -eq 'tag' -and $env:REF_NAME.StartsWith('engine/v')) {
            $version = $env:REF_NAME.Substring('engine/'.Length)
          } else {
            # Branch and pull-request CI verify the latest version already
            # published to the Go module proxy, not unpublished branch code.
            $version = 'v0.1.0-rc.3'
          }
          "version=$version" >> $env:GITHUB_OUTPUT
      - name: Published external consumer smoke (no replace)
        run: go run ./scripts/external-consumer-smoke -version '${{ steps.engine-version.outputs.version }}'

  race:
    name: Race detector
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false
      - name: Race detector for CLI and release tooling
        run: go test -race -count=1 ./...
      - name: Race detector for Engine
        run: go -C engine test -race -count=1 ./...
